name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.33.0'
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Unit tests
        run: pnpm -r test

      # El build de Next.js depende de DATABASE_URL (sitemap, ISR, etc.) y lo
      # ejecuta Vercel en el preview deploy por PR. En CI nos quedamos con
      # lint + typecheck + test para mantener el job rápido y sin secretos.

  e2e:
    name: e2e + a11y
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    # Requiere el secret DATABASE_URL para levantar `next dev` con datos.
    # El job se salta si el secret no está definido — evita fallos espurios
    # en forks o antes de configurar secretos.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if no DATABASE_URL
        id: guard
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::DATABASE_URL no configurado; saltando E2E."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.guard.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.guard.outputs.skip != 'true'
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E + a11y
        if: steps.guard.outputs.skip != 'true'
        working-directory: apps/web
        run: pnpm e2e

      - name: Upload Playwright report
        if: always() && steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  lighthouse:
    name: lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    # Arranca por demanda: sólo si el PR lleva label `perf` o en push a main.
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'perf') }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      LHCI_STRICT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if no DATABASE_URL
        id: guard
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::DATABASE_URL no configurado; saltando Lighthouse."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.guard.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.guard.outputs.skip != 'true'
        working-directory: apps/web
        run: pnpm build

      - name: Lighthouse CI (contra build de producción)
        if: steps.guard.outputs.skip != 'true'
        working-directory: apps/web
        run: |
          pnpm start &
          npx wait-on http://localhost:3000 --timeout 60000
          LHCI_BASE_URL=http://localhost:3000 pnpm lighthouse
